<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Odontologia</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff5f8f">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{
    --primary:#E56793;
    --primary-dark:#D34D7E;
    --secondary:#B887F4;

    --background:#F6F7FB;
    --card:#FFFFFF;

    --text:#1D1D1F;
    --subtitle:#767680;

    --border:#ECECF3;

    --shadow:0 10px 35px rgba(28,28,30,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}

body{
    background:var(--background);
    display:flex;
    justify-content:center;
    min-height:100vh;
    color:var(--text);
}

.app{
    width:100%;
    max-width:430px;
    padding:24px 18px 35px;
}

/* HEADER */

.header{

    background:white;

    border-radius:28px;

    padding:26px;

    margin-bottom:18px;

    box-shadow:var(--shadow);

    border:1px solid var(--border);
}

.header h1{

    color:var(--text);

    font-size:28px;

    font-weight:700;

    margin-bottom:8px;
}

.header span{

    color:var(--subtitle);

    font-size:15px;
}

/* CARD PRINCIPAL */

.days-card{

    background:linear-gradient(135deg,var(--primary),var(--secondary));

    border-radius:30px;

    padding:30px;

    color:white;

    margin-bottom:22px;

    box-shadow:0 20px 45px rgba(229,103,147,.30);
}

.days{

    font-size:74px;

    font-weight:800;

    letter-spacing:-3px;
}

.days-label{

    margin-top:10px;

    font-size:15px;

    opacity:.95;
}

/* GRID */

.grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:16px;

    margin-bottom:24px;
}

.grid-card{

    background:white;

    border-radius:24px;

    padding:24px;

    cursor:pointer;

    transition:.25s;

    border:1px solid var(--border);

    box-shadow:var(--shadow);

    text-align:left;
}

.grid-card:hover{

    transform:translateY(-4px);
}

.grid-card span{

    font-size:28px;

    display:block;

    margin-bottom:14px;
}

.grid-card{

    font-size:15px;

    font-weight:600;

    color:var(--text);

    line-height:1.4;
}

/* CARDS */

.card{

    background:white;

    border-radius:26px;

    padding:22px;

    margin-bottom:18px;

    box-shadow:var(--shadow);

    border:1px solid var(--border);
}

.title{

    color:var(--subtitle);

    font-size:13px;

    text-transform:uppercase;

    letter-spacing:1px;

    margin-bottom:16px;

    font-weight:700;
}

.text{

    font-size:15px;

    color:var(--text);

    line-height:1.6;
}

/* BARRA */

.progress-bg{

    width:100%;

    height:12px;

    background:#ECEAF5;

    border-radius:999px;

    overflow:hidden;

    margin-bottom:12px;
}

.progress{

    height:100%;

    width:0;

    border-radius:999px;

    background:linear-gradient(90deg,var(--primary),var(--secondary));

    transition:.8s;
}

/* ANIMAÇÕES */

.grid-card,
.card,
.header,
.days-card{

    transition:.25s;
}

.card:hover,
.header:hover,
.days-card:hover{

    transform:translateY(-2px);
}

/* HEADER */

.app-cover{

    width:100%;

    height:160px;

    object-fit:cover;

    border-radius:22px;

    margin-bottom:20px;

    box-shadow:0 12px 30px rgba(0,0,0,.15);

}


.header{

    background:white;

    border-radius:28px;

    padding:26px;

    margin-bottom:18px;

    box-shadow:var(--shadow);

    border:1px solid var(--border);
}
</style>
</head>

<body>

<div class="app">

<div class="header">

    <img src="Odonto.png" class="app-cover">

    <h1 id="greeting"></h1>

    <span id="subGreeting"></span>

</div>


  <div class="days-card">
    <div class="days" id="daysLeft">--</div>
    <div class="days-label">dias para a formatura</div>
  </div>

 
  <div class="grid">

<div class="grid-card" onclick="location.href='agenda.html'">

<span>📅</span>

Agenda

</div>

<div class="grid-card" onclick="location.href='horarios.html'">

<span>🦷</span>

Horários

</div>

</div>

  <div class="card">
    <div class="title"> Progresso da graduação</div>
    <div class="progress-bg">
      <div class="progress" id="progressBar"></div>
    </div>
    <div class="text" id="progressText"></div>
  </div>

  <!-- COMUNICADO -->
  <div class="card">
    <div class="title">Comunicado de hoje</div>
    <div class="text" id="dailyNotice"></div>
  </div>

</div>

<script>
function criarDataLocal(d) {
  const [a,m,di] = d.split("-").map(Number);
  return new Date(a, m-1, di);
}

const DATA_INICIO = criarDataLocal("2025-08-19");
const DATA_FORMATURA = criarDataLocal("2029-06-29");

const HORARIO_FIXO = {
  0: "Domingo de descanso 🌷",
  1: "🦷 Prótese Dentária Fixa e Ortodontia Preventiva",
  2: "🦷 Odontologia Legal, Estomatologia e Radiologia",
  3: "☕ Dia sem aulas presenciais",
  4: "🦷 Anatomia Dentária e Escultura",
  5: "🌸 Sem aulas presenciais",
  6: "Sábado de recarregar as energias ✨"
};

function atualizarApp() {
  const hoje = new Date();

  // saudação
  const hora = hoje.getHours();
  const greeting =
    hora < 12 ? "Bom dia, futura doutora 💗" :
    hora < 18 ? "Boa tarde, futura doutora 💗" :
    "Boa noite, futura doutora 💗";

  document.getElementById("greeting").innerText = greeting;
  document.getElementById("subGreeting").innerText =
"3º Período • Odontologia";
  // dias restantes
  const dias = Math.max(0, Math.floor((DATA_FORMATURA - hoje) / 86400000));
  document.getElementById("daysLeft").innerText = dias;

  // progresso
  const progresso = Math.min(
    100,
    Math.round(((hoje - DATA_INICIO) / (DATA_FORMATURA - DATA_INICIO)) * 100)
  );

  document.getElementById("progressBar").style.width = progresso + "%";
  document.getElementById("progressText").innerText =
    progresso + "% do curso concluído";

  // comunicado
  document.getElementById("dailyNotice").innerText =
    HORARIO_FIXO[hoje.getDay()];
}

atualizarApp();
</script>

</body>
</html>
